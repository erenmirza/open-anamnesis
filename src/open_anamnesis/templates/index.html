<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anamnesis - Flashcard Learning</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="navbar-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    <span class="logo-text">Anamnesis</span>
                </div>
                <p id="project-title" class="project-subtitle"></p>
            </div>
        </nav>

        <main class="container">
            <div id="decks-view" class="view">
                <div class="view-header">
                    <h2 class="view-title">Your Decks</h2>
                    <div class="stats" id="deck-stats"></div>
                </div>
                <div class="deck-controls">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" id="deck-search" placeholder="Search decks..." oninput="handleSearch(event)">
                    </div>
                    <div class="filter-controls">
                        <select id="deck-sort" onchange="handleSort(event)" class="sort-select">
                            <option value="name">Sort by Name</option>
                            <option value="cards">Sort by Card Count</option>
                            <option value="dependencies">Sort by Dependencies</option>
                        </select>
                        <div class="view-toggle">
                            <button id="view-grid" class="view-btn active" onclick="setViewMode('grid')" title="Grid view">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7"></rect>
                                    <rect x="14" y="3" width="7" height="7"></rect>
                                    <rect x="3" y="14" width="7" height="7"></rect>
                                    <rect x="14" y="14" width="7" height="7"></rect>
                                </svg>
                            </button>
                            <button id="view-list" class="view-btn" onclick="setViewMode('list')" title="List view">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="8" y1="6" x2="21" y2="6"></line>
                                    <line x1="8" y1="12" x2="21" y2="12"></line>
                                    <line x1="8" y1="18" x2="21" y2="18"></line>
                                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                </svg>
                            </button>
                            <button id="view-lineage" class="view-btn" onclick="setViewMode('lineage')" title="Lineage view">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <circle cx="6" cy="18" r="3"></circle>
                                    <circle cx="18" cy="6" r="3"></circle>
                                    <path d="M12 9V6M9 12H6M15 12h3M9.88 14.88L7.5 16.5"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="decks-list" class="decks-grid">
                    <!-- Dynamically populated -->
                </div>
                <div id="homescreen-lineage" class="homescreen-lineage hidden">
                    <div class="lineage-section-header">
                        <h3 class="lineage-section-title">Deck Dependencies</h3>
                        <button class="fullscreen-btn" onclick="toggleHomescreenLineageFullscreen()" title="Toggle Fullscreen">
                            <svg id="homescreen-fullscreen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                            </svg>
                        </button>
                    </div>
                    <div id="homescreen-lineage-content">
                        <!-- Dynamically populated -->
                    </div>
                </div>
            </div>

            <div id="deck-view" class="view hidden">
                <button class="back-btn" onclick="showDecksView()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Decks
                </button>
                <div class="deck-header">
                    <h2 id="deck-title" class="deck-title"></h2>
                    <p id="deck-description" class="deck-description"></p>
                </div>
                <div class="deck-actions">
                    <button class="btn btn-primary" onclick="startLearning()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        Start Learning
                    </button>
                    <button class="btn btn-secondary" onclick="startTest()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                        Take Test
                    </button>
                </div>
                <div class="cards-preview">
                    <div class="cards-header">
                        <h3 class="section-title">All Cards</h3>
                        <div class="view-toggle">
                            <button id="cards-view-grid" class="view-btn active" onclick="setCardsViewMode('grid')" title="Grid view">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7"></rect>
                                    <rect x="14" y="3" width="7" height="7"></rect>
                                    <rect x="3" y="14" width="7" height="7"></rect>
                                    <rect x="14" y="14" width="7" height="7"></rect>
                                </svg>
                            </button>
                            <button id="cards-view-list" class="view-btn" onclick="setCardsViewMode('list')" title="List view">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="8" y1="6" x2="21" y2="6"></line>
                                    <line x1="8" y1="12" x2="21" y2="12"></line>
                                    <line x1="8" y1="18" x2="21" y2="18"></line>
                                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="cards-list" class="cards-list">
                        <!-- Dynamically populated -->
                    </div>
                </div>
                <div id="deck-dependencies" class="deck-dependencies">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <div id="learn-view" class="view hidden">
                <button class="back-btn" onclick="backToDeck()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Deck
                </button>
                <div class="learn-header">
                    <h2 class="view-title">Learning Mode</h2>
                    <div class="progress-bar">
                        <div class="progress-fill" id="learn-progress"></div>
                    </div>
                </div>
                <div class="card-container">
                    <div class="card-counter">
                        <span id="current-card">1</span> / <span id="total-cards">10</span>
                    </div>
                    <div class="flashcard" onclick="flipCard(this)">
                        <div class="flashcard-inner">
                            <div class="flashcard-front">
                                <div class="card-label">Question</div>
                                <div class="card-content" id="card-front"></div>
                                <div class="flip-hint">Click to reveal answer</div>
                            </div>
                            <div class="flashcard-back">
                                <div class="card-label">Answer</div>
                                <div class="card-content" id="card-back"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-navigation">
                        <button class="btn btn-nav" onclick="prevCard()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                            Previous
                        </button>
                        <button class="btn btn-nav" onclick="nextCard()">
                            Next
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="test-view" class="view hidden">
                <button class="back-btn" onclick="backToDeck()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Deck
                </button>
                <div class="test-header">
                    <h2 class="view-title">Test Mode</h2>
                    <div class="progress-bar">
                        <div class="progress-fill" id="test-progress"></div>
                    </div>
                </div>
                <div class="test-container">
                    <div class="question-counter">
                        Question <span id="test-current">1</span> of <span id="test-total">10</span>
                    </div>
                    <div class="question-section">
                        <h3 id="question-text" class="question-text"></h3>
                        <div id="answer-options" class="answer-options">
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                    <div class="test-navigation">
                        <button class="btn btn-nav" onclick="prevQuestion()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                            Previous
                        </button>
                        <button class="btn btn-nav" onclick="nextQuestion()">
                            Next
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="lineage-view" class="view hidden">
                <button class="back-btn" onclick="closeLineageView()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Deck
                </button>
                <div class="lineage-header">
                    <h2 id="lineage-title" class="view-title">Lineage View</h2>
                    <p class="lineage-description">Navigate the relationship graph by clicking on nodes. Click and drag to pan.</p>
                </div>
                <div id="lineage-graph" class="lineage-graph">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </main>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
